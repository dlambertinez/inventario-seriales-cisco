name: Generar EXE Windows 64 bits

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "obtener_seriales_cisco.py"
      - "requirements.txt"
      - "ips.txt"
      - "README.md"
      - ".github/workflows/generar-exe.yml"

jobs:
  generar-exe:
    name: Compilar ejecutable Windows x64
    runs-on: windows-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python de 64 bits
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"

      - name: Mostrar información de Python
        shell: powershell
        run: |
          python --version
          python -c "import platform; print('Arquitectura:', platform.architecture())"
          python -c "import sys; print('Ejecutable Python:', sys.executable)"

      - name: Actualizar pip
        shell: powershell
        run: |
          python -m pip install --upgrade pip

      - name: Instalar dependencias
        shell: powershell
        run: |
          python -m pip install -r requirements.txt

      - name: Mostrar dependencias instaladas
        shell: powershell
        run: |
          python -m pip list

      - name: Validar importaciones
        shell: powershell
        run: |
          python -c "import netmiko; print('Netmiko correcto:', netmiko.__version__)"
          python -c "import openpyxl; print('OpenPyXL correcto:', openpyxl.__version__)"
          python -c "import textfsm; print('TextFSM importado correctamente')"
          python -c "import ntc_templates; print('NTC Templates importado correctamente')"

      - name: Validar sintaxis del programa
        shell: powershell
        run: |
          python -m py_compile obtener_seriales_cisco.py

      - name: Generar ejecutable con PyInstaller
        shell: powershell
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --console `
            --name InventarioSerialesCisco `
            --collect-all netmiko `
            --collect-all paramiko `
            --collect-all textfsm `
            --collect-all ntc_templates `
            --collect-all openpyxl `
            --hidden-import openpyxl `
            --hidden-import openpyxl.cell._writer `
            --hidden-import netmiko `
            --hidden-import paramiko `
            --hidden-import bcrypt `
            --hidden-import cryptography `
            --hidden-import yaml `
            obtener_seriales_cisco.py

      - name: Verificar ejecutable
        shell: powershell
        run: |
          if (-not (Test-Path "dist\InventarioSerialesCisco.exe")) {
            throw "No se generó el archivo InventarioSerialesCisco.exe"
          }

          Get-Item "dist\InventarioSerialesCisco.exe" |
            Format-List Name, FullName, Length, LastWriteTime

      - name: Preparar paquete de distribución
        shell: powershell
        run: |
          New-Item `
            -ItemType Directory `
            -Force `
            -Path "paquete" |
            Out-Null

          Copy-Item `
            "dist\InventarioSerialesCisco.exe" `
            "paquete\InventarioSerialesCisco.exe"

          Copy-Item `
            "ips.txt" `
            "paquete\ips.txt"

          Copy-Item `
            "README.md" `
            "paquete\README.md"

      - name: Generar hash SHA256
        shell: powershell
        run: |
          $hash = Get-FileHash `
            "paquete\InventarioSerialesCisco.exe" `
            -Algorithm SHA256

          "$($hash.Hash)  InventarioSerialesCisco.exe" |
            Out-File `
              -FilePath "paquete\SHA256.txt" `
              -Encoding ascii

          Get-Content "paquete\SHA256.txt"

      - name: Mostrar archivos del paquete
        shell: powershell
        run: |
          Get-ChildItem "paquete" |
            Format-Table Name, Length, LastWriteTime

      - name: Publicar ejecutable
        uses: actions/upload-artifact@v4
        with:
          name: InventarioSerialesCisco-Windows-x64
          path: paquete/
          if-no-files-found: error
          retention-days: 30
